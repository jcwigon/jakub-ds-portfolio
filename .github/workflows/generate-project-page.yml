name: Generate Project Page (PR-ready)

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Project title (shown in nav and H1)"
        required: true
        type: string
      date:
        description: "Creation date (YYYY-MM-DD)"
        required: true
        type: string
      repo_url:
        description: "GitHub repo URL"
        required: true
        type: string
      demo_url:
        description: "Demo URL (optional)"
        required: false
        type: string
      skills:
        description: "Comma-separated skills (e.g., Python, Pandas, Streamlit)"
        required: true
        type: string
      description:
        description: "Short project description (1-2 paragraphs)."
        required: true
        type: string
      components:
        description: "Key components (comma or semicolon separated)"
        required: true
        type: string
      structure:
        description: "Project structure items (semicolon separated)"
        required: true
        type: string
      workflow_image:
        description: "Path under docs/ e.g. projects/imgs/Pred_app.png (optional)"
        required: false
        type: string
      example_images:
        description: "Comma-separated image paths under docs/ (optional)"
        required: false
        type: string
      slug:
        description: "Filename slug without .md (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate page
        env:
          TITLE: ${{ inputs.title }}
          DATE: ${{ inputs.date }}
          REPO_URL: ${{ inputs.repo_url }}
          DEMO_URL: ${{ inputs.demo_url }}
          SKILLS: ${{ inputs.skills }}
          DESCRIPTION: ${{ inputs.description }}
          COMPONENTS: ${{ inputs.components }}
          STRUCTURE: ${{ inputs.structure }}
          WORKFLOW_IMAGE: ${{ inputs.workflow_image }}
          EXAMPLE_IMAGES: ${{ inputs.example_images }}
          SLUG: ${{ inputs.slug }}
        run: |
          python scripts/generate_project_page.py

      - name: Create branch + commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/project-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add mkdocs.yml docs/projects
          git commit -m "Add project page: ${{ inputs.title }}"
          git push --set-upstream origin "$BRANCH"

          echo "Created branch: $BRANCH"
          echo "Now open a PR from $BRANCH into main."
